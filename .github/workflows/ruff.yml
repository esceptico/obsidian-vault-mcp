name: Ruff

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Check formatting
        run: uvx ruff==0.11.5 format --check .

      - name: Lint
        run: uvx ruff==0.11.5 check .
